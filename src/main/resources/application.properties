spring.application.name=Analysis

spring.task.scheduling.pool.size=1

spring.data.mongodb.uri=mongodb+srv://root:HanishGowtham222\$@awscluster1.d5xhu0u.mongodb.net/
spring.data.mongodb.database=mine
server.port=8080

options.expiry-date=2026-02-24

runindicatorscanner=false
runoptionchainscanner=false


# Access Keys

runaccesskeyinsertor=false
rungrowaccesskeyinsertor=false



server.servlet.context-path=/analysis

# Reduce Mongo driver noise
logging.level.org.mongodb.driver=WARN
logging.level.org.mongodb.driver.cluster=WARN
