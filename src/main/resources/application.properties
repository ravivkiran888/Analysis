spring.application.name=Analysis

spring.task.scheduling.pool.size=1

spring.data.mongodb.uri=mongodb+srv://root:HanishGowtham222\$@awscluster1.d5xhu0u.mongodb.net/
spring.data.mongodb.database=mine
server.port=8080

options.expiry-date=2026-02-24

runindicatorscanner=false
runindices=false


# Access Keys

runaccesskeyinsertor=false
rungrowaccesskeyinsertor=false


server.servlet.context-path=/analysis

# Reduce Mongo driver noise
logging.level.org.mongodb.driver=WARN
logging.level.org.mongodb.driver.cluster=WARN
logging.level.org.mongodb.driver.connection=WARN

spring.data.mongodb.auto-index-creation=true



# Set pattern for better readability
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# CORS Configuration
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
management.endpoints.web.cors.allowed-headers=*

resilience4j.circuitbreaker.instances.growwApi.slidingWindowSize=50
resilience4j.circuitbreaker.instances.growwApi.minimumNumberOfCalls=20
resilience4j.circuitbreaker.instances.growwApi.failureRateThreshold=60
resilience4j.circuitbreaker.instances.growwApi.waitDurationInOpenState=5m
resilience4j.circuitbreaker.instances.growwApi.permittedNumberOfCallsInHalfOpenState=5
resilience4j.circuitbreaker.instances.growwApi.automaticTransitionFromOpenToHalfOpenEnabled=true